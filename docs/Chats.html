<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ConoCEU — Chats</title>
  <link rel="stylesheet" href="css/style_chats.css">
</head>
<body class="ch-page">
  <!-- Header -->
  <header class="ch-header">
    <a href="index.html" class="ch-brand" aria-label="Ir a inicio">
      <img src="img/logoceu.png" alt="Logo CEU" class="ch-logo">
      <span class="ch-brand-cono">Cono</span><span class="ch-brand-ceu">CEU</span>
    </a>

    <h1 class="ch-title">Chats</h1>

    <nav class="ch-actions" aria-label="Acciones">
      <span class="ch-iconbtn"><img src="img/Chats.png" class="ch-icon"></span>
      <a class="ch-iconbtn" href="Notificaciones.html"><img src="img/Campanita.png" class="ch-icon"></a>
      <a class="ch-iconbtn" href="Perfil.html"><img src="img/Perfil.png" class="ch-icon"></a>
    </nav>
  </header>

  <!-- Layout -->
  <main class="ch-layout">
    <!-- Sidebar -->
    <aside class="ch-sidebar">
      <div class="ch-tabs">
        <button class="ch-tab is-active" data-target="#list-ind">Individuales</button>
        <button class="ch-tab" data-target="#list-grp">Grupales</button>
      </div>

      <div id="list-ind" class="ch-list"></div>
      <div id="list-grp" class="ch-list" hidden></div>

      <input id="search-user" type="text" placeholder="Buscar usuario..." />
      <div id="search-results"></div>

      <button id="btn-new-chat" class="ch-new">Nuevo chat</button>
    </aside>

    <!-- Panel de chat -->
    <section class="ch-panel">
      <header class="ch-panel-hd">
        <img src="img/Perfil.png" class="ch-user-avatar" id="panel-avatar">
        <div class="ch-user">
          <strong id="panel-name">Selecciona un chat</strong>
          <span class="ch-user-status" id="panel-status">offline</span>
        </div>
      </header>

      <div class="ch-thread" id="mensajes">
        <div class="placeholder">Selecciona un chat en la columna izquierda para ver los mensajes.</div>
      </div>

      <form class="ch-input" onsubmit="return false;">
        <input type="text" id="mensajeInput" placeholder="Escribe un mensaje..." disabled>
        <button type="button" id="enviarBtn" disabled>Enviar</button>
      </form>
    </section>
  </main>

  <footer class="ch-footer">
    <small>© <span id="year"></span> ConoCEU</small>
  </footer>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="Chats.js"></script>
</body>
</html>
